name: Schedule a nightly run

on:
  schedule:
    - cron: '0 20 * * *' # Every day at 10pm CEST (8pm UTC).

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout timefold-solver-benchmarks
        uses: actions/checkout@v6
        with:
          path: ./timefold-solver-benchmarks
          repository: TimefoldAI/timefold-solver-benchmarks
      - name: Checkout timefold-solver
        uses: actions/checkout@v6
        with:
          path: ./timefold-solver
          repository: TimefoldAI/timefold-solver
      - name: Schedule the other workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BENCHMARK_PUBLISH_TOKEN }}
        run: |
          cd timefold-solver
          if git log --since="24 hours ago" --oneline | grep -q .; then
            cd ../timefold-solver-benchmarks
            echo '{}' | gh workflow run turtle.yml --json
            echo "Launched nightly turtle tests." >> $GITHUB_STEP_SUMMARY
            sleep 1m
            echo '{}' | gh workflow run performance_score_director.yml --json
            echo "Launched nightly score director perf tests." >> $GITHUB_STEP_SUMMARY
            sleep 1m
            echo '{}' | gh workflow run performance_quickstarts.yml --json
            echo "Queued nightly quickstart perf tests." >> $GITHUB_STEP_SUMMARY
          else
            # Don't waste money.
            echo "No commits in the past 24 hours." >> $GITHUB_STEP_SUMMARY
          fi
