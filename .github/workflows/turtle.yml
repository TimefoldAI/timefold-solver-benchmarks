name: Turtle Tests

on:
  workflow_dispatch:
    inputs:
      jdk:
        description: 'JDK version'
        default: '25'
        required: true
      branch:
        description: 'Branch to benchmark (needs to use 999-SNAPSHOT)'
        default: 'main'
        required: true
      branch_owner:
        description: 'User owning the branch'
        default: 'TimefoldAI'
        required: true

jobs:
  test:
    concurrency:
      group: turtle-${{ matrix.example }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [cloudbalancing, conferencescheduling, curriculumcourse, examination, flow_shop, machinereassignment, meetingscheduling, nurserostering, pas, taskassigning, travelingtournament, vehiclerouting]
    steps:
      # Clone timefold-solver
      - name: Checkout timefold-solver
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.inputs.branch_owner }}/timefold-solver
          ref: ${{ github.event.inputs.branch }}
          path: ./timefold-solver

      - name: Setup Temurin OpenJDK and Maven
        uses: actions/setup-java@v5
        with:
          java-version: ${{ github.event.inputs.jdk }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Quickly build timefold-solver
        working-directory: ./timefold-solver
        shell: bash
        run: ./mvnw -B -Dquickly clean install

      # Clone timefold-solver-enterprise
      - name: Checkout timefold-solver-enterprise
        uses: actions/checkout@v6
        with:
          repository: TimefoldAI/timefold-solver-enterprise
          token: ${{ secrets.JRELEASER_GITHUB_TOKEN }} # Safe; only used to clone the repo and not stored in the fork.
          path: ./timefold-solver-enterprise
      - name: Quickly build timefold-solver-enterprise
        working-directory: ./timefold-solver-enterprise
        shell: bash
        run: ./mvnw -B -Dquickly clean install

      # Clone timefold-solver-benchmarks
      - name: Checkout timefold-solver-benchmarks
        uses: actions/checkout@v6
        with:
          repository: TimefoldAI/timefold-solver-benchmarks
          path: ./timefold-solver-benchmarks
      - name: Run and test timefold-solver-benchmarks per example
        working-directory: ./timefold-solver-benchmarks
        shell: bash
        env:
          TIMEFOLD_ENTERPRISE_LICENSE: ${{ secrets.TIMEFOLD_SOLVER_CI_PROD_LICENSE }}
        run: ./mvnw -B -Dai.timefold.solver.benchmarks.examples.turtle=${{matrix.example}} -Dai.timefold.solver.benchmarks.examples.turtle.runTimeLimitMinutes=300 test
